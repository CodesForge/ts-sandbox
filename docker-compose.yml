services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: feed
      POSTGRES_USER: feed
      POSTGRES_PASSWORD: feed
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feed -d feed"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass feed
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "feed", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
